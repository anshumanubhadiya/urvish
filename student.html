<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard - Attendance System</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{
    min-height:100vh;
    padding:20px;
    background-image:linear-gradient(135deg, rgba(79,70,229,0.85), rgba(6,182,212,0.85)), url('background.jpg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}
.topbar{
    max-width:1000px; margin:0 auto 20px; display:flex; justify-content:space-between;
    align-items:center; color:white;
}
.topbar h1{ font-size:24px; }
.logout-btn{
    padding:8px 18px; border:none; border-radius:10px; background:rgba(255,255,255,0.9);
    color:#4f46e5; font-weight:600; cursor:pointer;
}

.grid{ max-width:1000px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:20px; }
@media (max-width:700px){ .grid{ grid-template-columns:1fr; } }

.box{ padding:25px; border-radius:20px; background:rgba(255,255,255,0.92); box-shadow:0 10px 25px rgba(0,0,0,0.2); }
.full{ grid-column:1 / -1; }

h2{ color:#4f46e5; margin-bottom:15px; }
.profile-row{ display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee; font-size:14px; }
.profile-row b{ color:#333; }

label{ display:block; font-size:13px; font-weight:600; color:#333; margin-bottom:5px; }
select{ width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; margin-bottom:12px; }

.badge{ padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; }
.badge.present{ background:#dcfce7; color:#16a34a; }
.badge.absent{ background:#fee2e2; color:#dc2626; }
.badge.none{ background:#f1f5f9; color:#64748b; }

table{ width:100%; border-collapse:collapse; margin-top:10px; font-size:14px; }
th, td{ padding:10px; border-bottom:1px solid #eee; text-align:left; }
th{ background:#4f46e5; color:white; }

.bar-bg{ background:#eee; border-radius:6px; overflow:hidden; height:12px; width:120px; display:inline-block; vertical-align:middle; }
.bar-fill{ height:100%; }

.btn{
    padding:10px 18px; border:none; border-radius:8px; background:#4f46e5; color:white;
    font-weight:600; cursor:pointer; transition:0.2s;
}
.btn:hover{ background:#3d38c9; }
.btn.secondary{ background:#64748b; }
.btn.secondary:hover{ background:#475569; }
.msg{ font-size:13px; margin-top:10px; min-height:16px; }
.msg.error{ color:#e11d48; }
.msg.success{ color:#16a34a; }

.self-actions{ display:flex; gap:10px; flex-wrap:wrap; }

.modal-bg{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:50; }
.modal-bg.active{ display:flex; }
.modal{ background:white; border-radius:16px; padding:25px; width:420px; max-width:92%; text-align:center; }
video{ width:100%; border-radius:12px; background:#000; margin:12px 0; }
</style>
</head>
<body>

<div class="topbar">
    <h1 id="welcomeMsg">🎓 Student Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="grid">

    <div class="box">
        <h2>My Profile</h2>
        <div class="profile-row"><span>Name</span><b id="p_name"></b></div>
        <div class="profile-row"><span>Enrollment No.</span><b id="p_enroll"></b></div>
        <div class="profile-row"><span>Class</span><b id="p_class"></b></div>
        <div class="profile-row"><span>Face Enrolled</span><b id="p_face"></b></div>
        <div class="profile-row"><span>Device Biometric Enrolled</span><b id="p_bio"></b></div>
    </div>

    <div class="box">
        <h2>Mark My Attendance</h2>
        <label>Subject</label>
        <select id="selfSubject"></select>
        <p id="todayStatusLine" style="font-size:13px;color:#555;margin-bottom:10px;"></p>
        <div class="self-actions">
            <button class="btn" onclick="startFaceAttendance()">📷 Face Attendance</button>
            <button class="btn secondary" onclick="startBiometricAttendance()">🔒 Fingerprint / Face Unlock</button>
        </div>
        <p id="selfMsg" class="msg"></p>
    </div>

    <div class="box full">
        <h2>My Subject-Wise Attendance</h2>
        <table id="subjectTable">
            <thead><tr><th>Subject</th><th>Present</th><th>Absent</th><th>Attendance %</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="box full">
        <h2>My Attendance History</h2>
        <table id="historyTable">
            <thead><tr><th>Date</th><th>Subject</th><th>Status</th><th>Method</th><th>Time</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<!-- Face Capture Modal -->
<div class="modal-bg" id="faceModal">
    <div class="modal">
        <h3 id="faceModalTitle">Face Capture</h3>
        <video id="faceVideo" autoplay muted playsinline></video>
        <p id="faceModalMsg" class="msg"></p>
        <button class="btn" id="faceCaptureBtn">📸 Capture</button>
        <button class="btn secondary" onclick="closeFaceModal()">Cancel</button>
    </div>
</div>

<script src="db.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="biometric.js"></script>
<script>

// ---- Auth guard ----
const session = DB.getSession();
if (!session || session.role !== "student") {
    window.location.href = "login.html";
}
let student = DB.findStudent(session.id);
if(!student){ DB.clearSession(); window.location.href = "login.html"; }

function logout(){ DB.clearSession(); window.location.href = "login.html"; }

function refreshProfile(){
    student = DB.findStudent(session.id);
    document.getElementById("welcomeMsg").textContent = `🎓 Welcome, ${student.name}`;
    document.getElementById("p_name").textContent = student.name;
    document.getElementById("p_enroll").textContent = student.enrollment;
    document.getElementById("p_class").textContent = student.className;
    document.getElementById("p_face").textContent = student.faceDescriptor ? "Yes ✅" : "Not yet";
    document.getElementById("p_bio").textContent = student.biometricCredId ? "Yes ✅" : "Not yet";
}

function populateSubjectSelect(){
    const sel = document.getElementById("selfSubject");
    const subjects = DB.getAllSubjects();
    const prev = sel.value;
    sel.innerHTML = subjects.length
        ? subjects.map(s => `<option value="${s}">${s}</option>`).join("")
        : `<option value="">No subjects registered yet</option>`;
    if(subjects.includes(prev)) sel.value = prev;
    updateTodayStatusLine();
}
document.getElementById("selfSubject").addEventListener("change", updateTodayStatusLine);

function updateTodayStatusLine(){
    const subject = document.getElementById("selfSubject").value;
    const line = document.getElementById("todayStatusLine");
    if(!subject){ line.textContent = ""; return; }
    const today = DB.getTodayStatus(student.enrollment, subject);
    line.textContent = today
        ? `Today's status for ${subject}: ${today.status.toUpperCase()} (${today.method})`
        : `No attendance marked yet today for ${subject}.`;
}

function refreshSubjectSummary(){
    const summary = DB.getSubjectSummaryForStudent(student.enrollment);
    const tbody = document.querySelector("#subjectTable tbody");
    tbody.innerHTML = "";
    const subjects = Object.keys(summary);
    if(subjects.length === 0){
        tbody.innerHTML = `<tr><td colspan="5" style="color:#888;">No attendance recorded yet.</td></tr>`;
        return;
    }
    subjects.forEach(sub => {
        const s = summary[sub];
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${sub}</td><td>${s.present}</td><td>${s.absent}</td><td>${s.pct}%</td>
            <td><div class="bar-bg"><div class="bar-fill" style="width:${s.pct}%; background:${s.pct < 75 ? '#dc2626' : '#16a34a'};"></div></div></td>`;
        tbody.appendChild(tr);
    });
}

function refreshHistory(){
    const records = DB.getAttendanceForStudent(student.enrollment);
    const tbody = document.querySelector("#historyTable tbody");
    tbody.innerHTML = "";
    records.forEach(r => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${r.date}</td><td>${r.subject}</td><td><span class="badge ${r.status}">${r.status.toUpperCase()}</span></td><td>${r.method}</td><td>${r.time}</td>`;
        tbody.appendChild(tr);
    });
}

// ---- Face self-attendance ----
let faceStream = null;
let faceMode = null;

async function openFaceModal(title){
    document.getElementById("faceModalTitle").textContent = title;
    document.getElementById("faceModalMsg").textContent = "Loading face models...";
    document.getElementById("faceModal").classList.add("active");
    try{
        await Biometric.loadFaceModels();
        faceStream = await Biometric.startCamera(document.getElementById("faceVideo"));
        document.getElementById("faceModalMsg").textContent = "Position your face in frame and click Capture.";
    } catch(err){
        document.getElementById("faceModalMsg").textContent = "Camera/model error: " + err.message;
    }
}
function closeFaceModal(){
    Biometric.stopCamera(faceStream);
    faceStream = null;
    document.getElementById("faceModal").classList.remove("active");
}

function getSelectedSubject(){
    const subject = document.getElementById("selfSubject").value;
    if(!subject){ alert("No subject available. Ask your faculty to add a subject first."); }
    return subject;
}

async function startFaceAttendance(){
    const subject = getSelectedSubject();
    if(!subject) return;
    if(!student.faceDescriptor){
        faceMode = "enroll";
        await openFaceModal("Enroll Your Face (one-time)");
    } else {
        faceMode = "attendance";
        await openFaceModal(`Face Attendance - ${subject}`);
    }
}

document.getElementById("faceCaptureBtn").addEventListener("click", async () => {
    const msg = document.getElementById("faceModalMsg");
    msg.textContent = "Analyzing...";
    try{
        const descriptor = await Biometric.getFaceDescriptor(document.getElementById("faceVideo"));
        if(!descriptor){
            msg.textContent = "No face detected. Try again with better lighting.";
            return;
        }
        if(faceMode === "enroll"){
            DB.updateStudent(student.enrollment, { faceDescriptor: descriptor });
            msg.textContent = "Face enrolled! You can now use it for attendance.";
            setTimeout(() => { closeFaceModal(); refreshProfile(); }, 1000);
        } else {
            const subject = document.getElementById("selfSubject").value;
            const distance = Biometric.compareFaces(descriptor, student.faceDescriptor);
            if(distance < 0.55){
                DB.markAttendance(student.enrollment, "present", "face", subject, null);
                msg.textContent = `Face matched (score ${distance.toFixed(2)}). Marked PRESENT for ${subject}.`;
                setTimeout(() => { closeFaceModal(); refreshAll(); }, 1200);
            } else {
                msg.textContent = `Face didn't match closely enough (score ${distance.toFixed(2)}). Try again.`;
            }
        }
    } catch(err){
        msg.textContent = "Error: " + err.message;
    }
});

// ---- Device biometric self-attendance ----
async function startBiometricAttendance(){
    const subject = getSelectedSubject();
    if(!subject) return;
    const selfMsg = document.getElementById("selfMsg");
    if(!Biometric.isWebAuthnSupported()){
        selfMsg.textContent = "This device/browser doesn't support fingerprint/face unlock.";
        selfMsg.className = "msg error";
        return;
    }
    try{
        if(!student.biometricCredId){
            const credId = await Biometric.registerBiometric(student.enrollment, student.name);
            DB.updateStudent(student.enrollment, { biometricCredId: credId });
            student = DB.findStudent(student.enrollment);
            selfMsg.textContent = "Device biometric enrolled! Verifying attendance now...";
        }
        const verified = await Biometric.verifyBiometric(DB.findStudent(student.enrollment).biometricCredId);
        if(verified){
            DB.markAttendance(student.enrollment, "present", "biometric", subject, null);
            selfMsg.textContent = `Verified via device biometric. Marked PRESENT for ${subject}.`;
            selfMsg.className = "msg success";
            refreshAll();
        }
    } catch(err){
        selfMsg.textContent = "Biometric error/cancelled: " + err.message;
        selfMsg.className = "msg error";
    }
}

function refreshAll(){
    refreshProfile();
    populateSubjectSelect();
    refreshSubjectSummary();
    refreshHistory();
}

// ---- Init ----
refreshAll();
</script>
</body>
</html>
